<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BitForge Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
        background: #020617;
        color: #ffffff;
        text-align: center;
        padding: 24px;
      }

      .box {
        max-width: 420px;
      }

      h1 {
        font-size: 28px;
        margin-bottom: 12px;
      }

      p {
        color: #cbd5e1;
        line-height: 1.6;
      }

      button {
        margin-top: 20px;
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        background: #2563eb;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>You are offline</h1>
      <p>
        BitForge needs an internet connection to load marketplace products,
        payments, downloads, and seller data.
      </p>
      <button onclick="window.location.reload()">Try Again</button>
    </div>
  </body>
</html>
